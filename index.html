<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusTracker</title>

    <!-- Geist Sans via CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css"
    />

    <!--
      Fallback: Inter via Google Fonts
      TODO: remover quando confirmar que Geist carrega corretamente em produção
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/styles/global.css" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[BusTracker PWA] Service Worker registrado!'))
            .catch(err => console.error('[BusTracker PWA] Falha ao registrar Service Worker:', err));
        });
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
